<!doctype html>
<html lang="hi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ऑफलाइन | Prakriti Sewa</title>
    <meta name="theme-color" content="#2e5e3a" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, system-ui, sans-serif;
        color: #183225;
        background: #fbfaf2;
      }
      main {
        max-width: 34rem;
        padding: 2rem;
        text-align: center;
      }
      h1 {
        font-size: clamp(2rem, 6vw, 4rem);
        line-height: 1.12;
        margin-bottom: 1rem;
      }
      p {
        font-size: 1.05rem;
        line-height: 1.75;
      }
      a {
        color: #2e5e3a;
        font-weight: 700;
        display: inline-block;
        margin-top: 1rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>आप अभी ऑफलाइन हैं।</h1>
      <p>
        प्रकृति सेवा आपके डिवाइस में सुरक्षित पेज दिखाने की कोशिश कर रही है।
        इंटरनेट वापस आते ही नई जानकारी अपने आप उपलब्ध हो जाएगी।
      </p>
      <a href="/">मुख्य पृष्ठ खोलें</a>
    </main>
  </body>
</html>
